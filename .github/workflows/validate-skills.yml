name: Validate agent skills

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install harness
        run: npm ci
      - name: Shared harness contracts
        run: npm run harness
      - name: Shell syntax
        run: find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
      - name: Commit diff check
        run: git show --check --oneline --no-renames HEAD
      - name: Structural skill validation
        run: bash scripts/validate-references.sh
      - name: Global installer smoke test
        run: bash scripts/install-links-smoke.sh
